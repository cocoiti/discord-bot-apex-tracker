services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: apex_bot
      POSTGRES_PASSWORD: apex_bot_pass
      POSTGRES_DB: apex_tracker
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apex_bot"]
      interval: 5s
      timeout: 3s
      retries: 10

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://apex_bot:apex_bot_pass@postgres:5432/apex_tracker
    volumes:
      - ./config:/app/config:ro

volumes:
  pgdata:
